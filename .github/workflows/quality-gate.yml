name: quality-gate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Test
        id: test
        continue-on-error: true
        run: npm test > test.log 2>&1
      - uses: actions/upload-artifact@v4
        if: steps.test.outcome == 'failure'
        with:
          name: test-failure
          path: test.log
      - name: Enforce test result
        if: steps.test.outcome == 'failure'
        run: exit 1
      - name: Verify clean tree after tests
        run: node scripts/assert-clean-working-tree.mjs
      - name: Build
        id: build
        continue-on-error: true
        run: npm run build > build.log 2>&1
      - uses: actions/upload-artifact@v4
        if: steps.build.outcome == 'failure'
        with:
          name: build-failure
          path: build.log
      - name: Enforce build result
        if: steps.build.outcome == 'failure'
        run: exit 1
      - name: Verify clean tree after build
        run: node scripts/assert-clean-working-tree.mjs
