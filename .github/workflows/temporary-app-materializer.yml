name: temporary-app-materializer

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  materialize:
    if: github.repository == 'ZyadShazly/FACTORY--APP' && github.head_ref == 'refactor/app-bootstrap-wiring'
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
      TARGET_BRANCH: refactor/app-bootstrap-wiring
    steps:
      - uses: actions/checkout@v4
        with:
          ref: refactor/app-bootstrap-wiring
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Materialize commit object
        id: materialize
        continue-on-error: true
        shell: bash
        run: |
          set -euo pipefail
          exec > >(tee materializer.log) 2>&1
          if [ ! -f scripts/materialize-app-bootstrap-integration.mjs ]; then
            echo "Materializer already removed; nothing to do."
            exit 0
          fi

          node scripts/materialize-app-bootstrap-integration.mjs

          head_sha="$(gh api "repos/${GITHUB_REPOSITORY}/git/ref/heads/${TARGET_BRANCH}" --jq .object.sha)"
          base_tree="$(gh api "repos/${GITHUB_REPOSITORY}/git/commits/${head_sha}" --jq .tree.sha)"

          app_blob="$(gh api --method POST "repos/${GITHUB_REPOSITORY}/git/blobs" \
            -f content="$(base64 -w0 src/AppMonolith.jsx)" \
            -f encoding=base64 --jq .sha)"
          test_blob="$(gh api --method POST "repos/${GITHUB_REPOSITORY}/git/blobs" \
            -f content="$(base64 -w0 tests/app-bootstrap-integration.test.mjs)" \
            -f encoding=base64 --jq .sha)"

          new_tree="$(jq -n \
            --arg base_tree "${base_tree}" \
            --arg app_blob "${app_blob}" \
            --arg test_blob "${test_blob}" \
            '{base_tree: $base_tree, tree: [
              {path: "src/AppMonolith.jsx", mode: "100644", type: "blob", sha: $app_blob},
              {path: "tests/app-bootstrap-integration.test.mjs", mode: "100644", type: "blob", sha: $test_blob}
            ]}' | gh api --method POST "repos/${GITHUB_REPOSITORY}/git/trees" --input - --jq .sha)"

          commit_sha="$(jq -n \
            --arg message 'refactor: wire app bootstrap modules' \
            --arg tree "${new_tree}" \
            --arg parent "${head_sha}" \
            '{message: $message, tree: $tree, parents: [$parent]}' | gh api --method POST "repos/${GITHUB_REPOSITORY}/git/commits" --input - --jq .sha)"

          printf '%s\n' "${commit_sha}" > materialized-commit-sha.txt
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: materialized-app-output
          path: |
            materialized-commit-sha.txt
            materializer.log
          if-no-files-found: warn
          retention-days: 1
      - name: Enforce materializer result
        if: steps.materialize.outcome == 'failure'
        run: exit 1
