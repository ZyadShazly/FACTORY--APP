name: temporary-app-materializer

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  materialize:
    if: github.repository == 'ZyadShazly/FACTORY--APP' && github.head_ref == 'refactor/app-bootstrap-wiring'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: refactor/app-bootstrap-wiring
          fetch-depth: 0
          token: ${{ github.token }}
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Materialize source once
        shell: bash
        run: |
          set -euo pipefail
          if [ ! -f scripts/materialize-app-bootstrap-integration.mjs ]; then
            echo "Materializer already removed; nothing to do."
            exit 0
          fi

          node scripts/materialize-app-bootstrap-integration.mjs
          rm scripts/materialize-app-bootstrap-integration.mjs

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/AppMonolith.jsx tests/app-bootstrap-integration.test.mjs scripts/materialize-app-bootstrap-integration.mjs
          git commit -m "refactor: wire app bootstrap modules"
          git push origin HEAD:refactor/app-bootstrap-wiring
