name: Wire actual cost workspace

on:
  push:
    branches:
      - agent/actual-cost-workspace-variance

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/actual-cost-workspace-variance
          fetch-depth: 0
      - name: Wire component
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('src/v22/projectWorkspace.jsx')
          text = path.read_text(encoding='utf-8')
          old_import = 'import { ProjectBudgetTab } from "./projectBudget";'
          new_import = old_import + '\nimport { ProjectActualCostTab } from "./projectActualCost";'
          old_view = '''    {tab === "actualCost" && <Panel><h3>أساس التكلفة الفعلية الحالي</h3><p className="workspace-note">المصدر الحالي هو `project_costs`. عهدة الأصل ليست تكلفة، والنقد المسلم للموظف يظل رصيد عهدة/ذمة حتى اعتماد سطر تسوية فريد المصدر. لا توجد محاكاة لتوزيع رواتب المصنع أو وحدة عهدة نقدية في هذا الإصدار.</p><PermissionGuard allow={permissions.project_financials_view} fallback={<div className="workspace-no-permission"><ShieldCheck size={24}/>لا تملك صلاحية عرض ماليات المشروع.</div>}><div className="cost-breakdown">{Object.entries({material:"مواد",production:"إنتاج",payroll:"رواتب",daily_labor:"عمالة يومية",expense:"مصروفات",transport:"نقل",other:"أخرى"}).map(([key,label])=><div key={key}><span>{label}</span><b>{money(costsByType[key])}</b></div>)}</div></PermissionGuard></Panel>}'''
          new_view = '    {tab === "actualCost" && <PermissionGuard allow={permissions.project_financials_view} fallback={<div className="workspace-no-permission"><ShieldCheck size={24}/>لا تملك صلاحية عرض ماليات المشروع.</div>}><ProjectActualCostTab project={project} profile={profile}/></PermissionGuard>}'
          if 'import { ProjectActualCostTab }' not in text:
              if old_import not in text:
                  raise SystemExit('budget import anchor not found')
              text = text.replace(old_import, new_import, 1)
          if '<ProjectActualCostTab ' not in text:
              if old_view not in text:
                  raise SystemExit('actual cost view anchor not found')
              text = text.replace(old_view, new_view, 1)
          path.write_text(text, encoding='utf-8')
          PY
      - name: Commit generated wiring
        run: |
          if git diff --quiet; then exit 0; fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/v22/projectWorkspace.jsx
          git commit -m "feat: connect actual cost workspace to projects"
          git push origin HEAD:agent/actual-cost-workspace-variance
